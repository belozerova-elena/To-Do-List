<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To Do List</title>
    <link rel="shortcut icon" href="img/image.png" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/normalize/8.0.1/normalize.min.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- HEADER -->
    <header class="header">
        <h1 class="header__title">To Do List</h1>
    </header>
    <!-- MAIN -->
    <main class="main">
        <!-- FORM -->
        <form class="form">
            <input type="text" name="task" class="form__input" placeholder="Write down the task">
            <button type="submit" class="form__button">Add task</button>
        </form>
        <!-- TASKS -->
        <section class="tasks">
            <h2 class="tasks__title">Tasks:</h2>
            <div class="tasks__list"></div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
